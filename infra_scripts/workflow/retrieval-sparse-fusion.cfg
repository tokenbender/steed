# Retrieval Sparse Fusion profile.
# Inherits baseline workflow defaults, then pins repository target.

# shellcheck disable=SC1091
source "$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)/default.cfg"

# Pod/host defaults for this project profile.
LIUM_TARGET="my-gpu-pod"
OPS_DEFAULT_HOST="lium"
LIUM_POD_NAME="my-gpu-pod"
LIUM_GPU="RTX4090"

# Override default volume attach; run without mounting a persistent volume.
LIUM_VOLUME=""

OPS_REMOTE_REPO="/root/work/retrieval-sparse-fusion"
OPS_LOCAL_REPO="/Users/tokenbender/Documents/retrieval-sparse-fusion"
REPO_URL="https://github.com/tokenbender/retrieval-sparse-fusion.git"
CHECKOUT_BRANCH="main"
EXPECT_GIT_SHA=""

# Repo-specific install path (this repo is not package-installable via -e .).
CHECKOUT_INSTALL_CMD='${VENV_PYTHON} -m pip install -U pip && ${VENV_PYTHON} -m pip install -r requirements.txt'

# Project-level W&B defaults.
WANDB_PROJECT="steed-research"
